name: Sync Grist

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Grist data
        env:
          GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
        run: |
          curl -s \
            -H "Authorization: Bearer $GRIST_API_KEY" \
            "https://grist.numerique.gouv.fr/api/docs/9FFW3ALPVboV/tables/Elus/records" \
            > raw.json
          python3 extract.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "sync: mise à jour élus"
          git push
