<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des Élus – Plan de mandat GBM</title>
  <style>
    :root {
      --bg: #f7f6f2;
      --border: #e2e0d8;
      --text: #1a1a18;
      --muted: #6b6b65;
      --accent: #185FA5;
      --err-bg: #FCEBEB;
      --err-border: #F7C1C1;
      --err-text: #A32D2D;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }
    header {
      max-width: 640px;
      margin: 0 auto 2.5rem;
      border-bottom: 1.5px solid var(--border);
      padding-bottom: 1.5rem;
    }
    .eyebrow {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    h1 { font-size: 1.75rem; font-weight: normal; line-height: 1.3; }
    header p.sub {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: var(--muted);
      font-family: 'Courier New', monospace;
    }
    #status {
      max-width: 640px;
      margin: 0 auto 1.5rem;
      font-size: 0.875rem;
      font-family: 'Courier New', monospace;
      color: var(--muted);
    }
    #status.error {
      color: var(--err-text);
      background: var(--err-bg);
      padding: 0.75rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--err-border);
    }
    ol {
      max-width: 640px;
      margin: 0 auto;
      list-style: none;
      counter-reset: elus;
    }
    ol li {
      counter-increment: elus;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      padding: 0.875rem 0;
      border-bottom: 0.5px solid var(--border);
    }
    ol li:last-child { border-bottom: none; }
    ol li::before {
      content: counter(elus, decimal-leading-zero);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 28px;
      flex-shrink: 0;
    }
    ol li span { font-size: 1rem; line-height: 1.4; }
    #count {
      max-width: 640px;
      margin: 1.5rem auto 0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Plan de mandat · GBM</p>
    <h1>Liste des Élus</h1>
    <p class="sub">Synchronisé depuis Grist · mis à jour quotidiennement</p>
  </header>

  <div id="status"><span class="spinner"></span> Chargement…</div>
  <ol id="liste"></ol>
  <p id="count"></p>

  <script>
    async function load() {
      const status = document.getElementById('status');
      const liste  = document.getElementById('liste');
      const count  = document.getElementById('count');

      try {
        const res = await fetch('data.json');
        if (!res.ok) throw new Error('data.json introuvable (' + res.status + ')');
        const noms = await res.json();

        status.textContent = '';

        if (!noms.length) {
          status.textContent = 'Aucun élu trouvé.';
          return;
        }

        noms.forEach(function(nom) {
          const li = document.createElement('li');
          const sp = document.createElement('span');
          sp.textContent = nom;
          li.appendChild(sp);
          liste.appendChild(li);
        });

        count.textContent = noms.length + ' élu' + (noms.length > 1 ? 's' : '') + ' au total';

      } catch (err) {
        status.className = 'error';
        status.textContent = 'Erreur : ' + err.message;
      }
    }

    load();
  </script>
</body>
</html>
